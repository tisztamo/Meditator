<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditator — Studio</title>
<script type="importmap">
{ "imports": { "amanita": "/amanita/a.js" } }
</script>
<style>
  :root{
    --bg:#0a0d13; --bg2:#0d111a; --surface:#10141d; --surface2:#141926; --rail:#0b0e15;
    --line:rgba(235,235,245,.10); --ink:#e9e7e2; --dim:#99a1b4; --faint:#6b7387;
    --cyan:#7fe0f0; --amber:#f2c879; --green:#7ee2a8; --red:#e87f7f; --violet:#b79cf0;
    --serif:"Charter","Iowan Old Style",Cambria,Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"Cascadia Code",Consolas,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);height:100vh;
       display:flex;flex-direction:column;overflow:hidden}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;gap:16px;padding:9px 18px;border-bottom:1px solid var(--line);
         background:var(--bg2);flex:none;font-size:.86rem}
  .brand{font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:9px}
  .brand .mark{color:var(--violet)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:none}
  .dot.live{background:var(--green);box-shadow:0 0 8px rgba(126,226,168,.6)}
  .dot.err{background:var(--red)}
  .focusmeta{color:var(--dim);font-family:var(--mono);font-size:.78rem;display:flex;gap:10px;align-items:center;min-width:0}
  .focusmeta .nm{color:var(--ink);font-family:var(--sans);font-weight:600}
  .focusmeta .pub{color:var(--green);border:1px solid rgba(126,226,168,.4);border-radius:99px;padding:1px 7px;font-size:.7rem}
  .state{margin-left:auto;display:flex;align-items:center;gap:14px;color:var(--dim);font-family:var(--mono);font-size:.78rem}
  .pill{padding:2px 9px;border:1px solid var(--line);border-radius:99px}
  .pill.thinking{color:var(--cyan);border-color:rgba(127,224,240,.4)}
  .pill.speaking{color:var(--amber);border-color:rgba(242,200,121,.5);background:rgba(242,200,121,.06)}
  .pill.asleep{color:var(--faint)}
  .gauge{display:flex;align-items:center;gap:7px}
  .bar{width:84px;height:7px;border-radius:99px;background:var(--surface2);overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),var(--green));transition:width .4s ease}

  /* ---------- layout ---------- */
  main{flex:1;display:grid;grid-template-columns:288px minmax(0,1.5fr) minmax(330px,1fr);min-height:0}
  .col{display:flex;flex-direction:column;min-height:0;min-width:0}
  .col.rail{background:var(--rail);border-right:1px solid var(--line)}
  .col.left{border-right:1px solid var(--line)}
  .colhead{padding:8px 16px;font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
           color:var(--faint);border-bottom:1px solid var(--line);flex:none;display:flex;justify-content:space-between;align-items:center}

  /* ---------- roster rail ---------- */
  .rail .scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2a3040 transparent}
  .wake{padding:12px 13px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .wake h4{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;font-weight:600}
  .wake select{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:8px;
               padding:7px 9px;font-size:.84rem;font-family:var(--sans);outline:none}
  .wake .det{font-family:var(--mono);font-size:.72rem;color:var(--dim);margin:8px 2px;line-height:1.6}
  .wake .det .home{color:var(--violet)}
  .wake .warn{color:var(--amber)} .wake .block{color:var(--red)} .wake .ok{color:var(--green)}
  .wake .row{display:flex;align-items:center;gap:8px;margin-top:9px}
  .wake label.dry{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--dim);cursor:pointer;user-select:none}
  .wake button{margin-left:auto;background:rgba(183,156,240,.16);border:1px solid rgba(183,156,240,.4);color:#cdbcf6;
               border-radius:8px;padding:7px 16px;cursor:pointer;font-size:.84rem}
  .wake button:hover{background:rgba(183,156,240,.28)}
  .wake button:disabled{opacity:.4;cursor:default}

  .mind{margin:8px 9px;border:1px solid var(--line);border-radius:10px;background:var(--surface);cursor:pointer;
        padding:9px 11px;transition:border-color .15s,background .15s}
  .mind:hover{border-color:rgba(183,156,240,.4)}
  .mind.focused{border-color:var(--violet);background:var(--surface2);box-shadow:0 0 0 1px rgba(183,156,240,.25) inset}
  .mind .top{display:flex;align-items:center;gap:7px}
  .mind .nm{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-family:var(--mono);font-size:.65rem;letter-spacing:.04em;padding:1px 7px;border-radius:99px;border:1px solid var(--line);flex:none}
  .badge.waking{color:var(--amber);border-color:rgba(242,200,121,.5);animation:pulse 1.3s ease-in-out infinite}
  .badge.awake{color:var(--green);border-color:rgba(126,226,168,.5)}
  .badge.sleeping{color:var(--violet);border-color:rgba(183,156,240,.5)}
  .badge.exited{color:var(--faint)} .badge.crashed{color:var(--red);border-color:rgba(232,127,127,.5)}
  .mind .sub{font-family:var(--mono);font-size:.7rem;color:var(--faint);margin-top:5px;line-height:1.6;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mind .sub .home{color:var(--violet)} .mind .sub .pub{color:var(--green)}
  .mind .det{font-family:var(--sans);font-size:.72rem;color:var(--dim);margin-top:4px;font-style:italic;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mind .acts{display:flex;gap:6px;margin-top:9px}
  .mind .acts button{background:var(--surface2);border:1px solid var(--line);color:var(--dim);border-radius:7px;
                     padding:4px 10px;font-size:.74rem;cursor:pointer}
  .mind .acts button:hover{background:rgba(255,255,255,.07);color:var(--ink)}
  .mind .acts button.force{color:var(--red);border-color:rgba(232,127,127,.35)}
  .mind .acts button.force:hover{background:rgba(232,127,127,.12)}
  .mind .meter{height:5px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-top:8px}
  .mind .meter > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),var(--green));transition:width .4s}
  .empty{color:var(--faint);font-size:.8rem;text-align:center;padding:24px 14px;line-height:1.6}

  /* ---------- stream ---------- */
  #stream{flex:1;overflow-y:auto;padding:22px 26px;font-family:var(--serif);font-size:1.04rem;line-height:1.75;
          color:#d9d6cf;scrollbar-width:thin;scrollbar-color:#2a3040 transparent}
  #stream p{margin:0 0 .2em}
  #stream p.thinned{color:#7d8496;font-size:.94rem}
  .say{font-family:var(--sans);margin:.8em 0;padding:11px 15px;border-radius:10px;
       background:rgba(242,200,121,.07);border:1px solid rgba(242,200,121,.28);color:#f4e3c2}
  .say::before{content:"🗣 ";opacity:.8}
  .say .lbl{display:block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:3px;opacity:.8}
  .stim{font-family:var(--sans);font-size:.85rem;color:var(--cyan);margin:.9em 0;padding-left:13px;
        border-left:2px solid rgba(127,224,240,.45)}
  .stim.you{color:var(--green);border-color:rgba(126,226,168,.5)}
  .bnd{font-family:var(--sans);font-size:.72rem;color:var(--faint);text-align:center;margin:1em 0;
       display:flex;align-items:center;gap:10px}
  .bnd::before,.bnd::after{content:"";flex:1;height:1px;background:var(--line)}
  .caret{display:inline-block;width:8px;height:1.05em;vertical-align:-.16em;background:var(--amber);
         margin-left:1px;animation:blink 1.06s steps(1) infinite;border-radius:1px}
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;
               color:var(--faint);font-family:var(--sans);text-align:center;gap:8px;padding:30px}
  .placeholder .big{font-size:1.1rem;color:var(--dim)}

  /* ---------- structure tree ---------- */
  #tree{flex:1;overflow-y:auto;padding:8px 10px 18px;scrollbar-width:thin;scrollbar-color:#2a3040 transparent}
  details.node{border:1px solid var(--line);border-radius:9px;margin:6px 0;background:var(--surface)}
  details.node[open]{background:var(--surface2)}
  details.node > summary{list-style:none;cursor:pointer;padding:8px 11px;display:flex;align-items:center;gap:8px;border-radius:9px;outline:none}
  details.node > summary::-webkit-details-marker{display:none}
  .tw{color:var(--faint);font-family:var(--mono);font-size:.7rem;width:10px;flex:none;transition:transform .15s}
  details.node[open] > summary .tw{transform:rotate(90deg)}
  .ntag{font-family:var(--mono);font-size:.72rem;color:var(--violet)}
  .nname{font-weight:600;font-size:.9rem}
  .nstat{margin-left:auto;font-family:var(--mono);font-size:.72rem;color:var(--dim);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48%}
  .npulse{width:7px;height:7px;border-radius:50%;background:var(--cyan);flex:none;opacity:0;transition:opacity .1s}
  .npulse.on{opacity:1;box-shadow:0 0 7px var(--cyan)}
  .nbody{padding:2px 12px 11px 28px}
  .kids{padding-left:13px}
  .attrs{display:flex;flex-wrap:wrap;gap:5px 8px;margin:4px 0 8px}
  .attr{font-family:var(--mono);font-size:.7rem;color:var(--dim);background:#0b0f16;border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .attr b{color:var(--amber);font-weight:500}
  .ident{font-family:var(--serif);font-size:.84rem;color:var(--faint);font-style:italic;border-left:2px solid var(--line);padding-left:9px;margin:2px 0 8px;white-space:pre-wrap}
  .feed{display:flex;flex-direction:column;gap:3px;max-height:220px;overflow-y:auto;scrollbar-width:thin}
  .ev{font-family:var(--mono);font-size:.72rem;color:var(--dim);line-height:1.45;border-top:1px dotted var(--line);padding-top:3px}
  .ev .t{color:var(--faint)}
  .ev.good{color:var(--green)} .ev.drop{color:var(--faint)} .ev.warn{color:var(--amber)} .ev.bad{color:var(--red)}
  .ev .sal{color:var(--cyan)}
  .framebox{font-family:var(--mono);font-size:.7rem;color:#aab2c5;background:#0b0f16;border:1px solid var(--line);border-radius:7px;padding:9px;white-space:pre-wrap;max-height:300px;overflow:auto;margin-top:5px}
  .framebox .sys{color:var(--faint)}

  /* ---------- log feed ---------- */
  .logs{flex:none;border-top:1px solid var(--line);background:var(--rail)}
  .logs summary{cursor:pointer;list-style:none;padding:7px 16px;font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:8px}
  .logs summary::-webkit-details-marker{display:none}
  .logs[open] summary{border-bottom:1px solid var(--line)}
  #log{height:158px;overflow-y:auto;padding:7px 14px;font-family:var(--mono);font-size:.71rem;line-height:1.5;scrollbar-width:thin;scrollbar-color:#2a3040 transparent}
  #log .ln{color:#9aa3b6;white-space:pre-wrap;word-break:break-word}
  #log .ln.err{color:var(--red)}

  /* ---------- input ---------- */
  .foot{display:flex;gap:9px;padding:11px 16px;border-top:1px solid var(--line);background:var(--bg2);flex:none}
  .foot input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:9px 13px;font-size:.92rem;outline:none}
  .foot input:focus{border-color:rgba(127,224,240,.45)}
  .foot input:disabled{opacity:.5}
  .foot button{background:rgba(127,224,240,.12);border:1px solid rgba(127,224,240,.3);color:var(--cyan);border-radius:9px;padding:9px 16px;cursor:pointer}
  .foot button:hover{background:rgba(127,224,240,.2)}
  .foot button:disabled{opacity:.4;cursor:default}

  /* ---------- toast ---------- */
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1a1320;border:1px solid rgba(232,127,127,.5);
         color:#f4c9c9;padding:10px 16px;border-radius:10px;font-size:.84rem;max-width:60ch;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9}
  #toast.show{opacity:1}

  @keyframes blink{50%{opacity:0}}
  @keyframes pulse{50%{opacity:.45}}
  @media (max-width:900px){ main{grid-template-columns:1fr} .col.rail,.col.left{border-right:none;border-bottom:1px solid var(--line)} }

  /* ---------- Amanita custom-element layout roles (additive) ---------- */
  /* The UI is now an Amanita component mesh; these give the new tags the layout
     role their predecessor divs had. studio-stream/#stream, studio-tree/#tree,
     studio-toast/#toast and studio-speak.foot inherit their existing rules. */
  studio-conn, studio-header, studio-log{display:contents}
  studio-wake{display:block}
  studio-roster{display:block}
</style>
</head>
<body>
  <!-- The Studio UI is an Amanita component mesh (src/studio/ui/). studio-conn
       owns the WebSocket to the supervisor + the focus state; the panes wire to
       it via /conn/ pub/sub refs and call its command methods. -->
  <studio-conn name="conn">
    <header>
      <studio-header></studio-header>
    </header>

    <main>
      <!-- roster rail -->
      <div class="col rail">
        <div class="colhead"><span>minds</span><span id="archRefresh" title="rescan architectures" style="cursor:pointer">⟳</span></div>
        <div class="scroll">
          <studio-wake class="wake"></studio-wake>
          <studio-roster></studio-roster>
        </div>
      </div>

      <!-- focused mind: stream -->
      <div class="col left">
        <div class="colhead"><span>stream of consciousness</span><span>thought · 🗣 speech · ⟂ stimulus</span></div>
        <studio-stream id="stream"></studio-stream>
        <studio-speak class="foot"></studio-speak>
      </div>

      <!-- focused mind: structure + logs -->
      <div class="col right">
        <div class="colhead"><span>the mind</span><span>click a part to open it</span></div>
        <studio-tree id="tree"></studio-tree>
        <studio-log></studio-log>
      </div>
    </main>

    <studio-toast id="toast"></studio-toast>
  </studio-conn>

  <script type="module" src="/ui/index.js"></script>
</body>
</html>
