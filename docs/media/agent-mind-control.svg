<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1060" font-family="ui-monospace,'Cascadia Code','JetBrains Mono',Consolas,Menlo,monospace">
  <defs>
    <marker id="cArrA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <marker id="cArrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5eead4"/>
    </marker>
    <marker id="cArrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ee7a0"/>
    </marker>
    <marker id="cArrV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1680" height="1060" fill="#0b0d11"/>

  <!-- ===== title ===== -->
  <text x="840" y="52" text-anchor="middle" font-size="24" font-weight="700" fill="#e6e9ef" letter-spacing="2">inversion of control</text>
  <text x="840" y="80" text-anchor="middle" font-size="14" fill="#9aa4b5">the agent calls the world and waits for the answer — the world calls the mind, and may be ignored</text>

  <!-- ===== headers + divider ===== -->
  <text x="420" y="138" text-anchor="middle" font-size="24" font-weight="700" fill="#fbbf24" letter-spacing="5">AGENT</text>
  <text x="1260" y="138" text-anchor="middle" font-size="24" font-weight="700" fill="#5eead4" letter-spacing="5">MIND</text>
  <line x1="840" y1="108" x2="840" y2="728" stroke="#e2e8f0" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- ===================== THE WORLD (the band both loops meet) ===================== -->
  <rect x="60" y="740" width="1560" height="130" rx="12" fill="#11151c" stroke="#e2e8f0" stroke-opacity="0.12"/>
  <text x="90" y="812" font-size="19" font-weight="700" fill="#e6e9ef" letter-spacing="4">THE WORLD</text>
  <text x="420" y="862" text-anchor="middle" font-size="12.5" fill="#fbbf24" fill-opacity="0.85">on the agent’s loop — every lap passes through it</text>
  <text x="1260" y="812" text-anchor="middle" font-size="12.5" fill="#5eead4" fill-opacity="0.85">off the mind’s loop — it can only knock</text>

  <!-- ===================== AGENT — the loop runs through the world ===================== -->
  <!-- reason -->
  <rect x="320" y="196" width="200" height="78" rx="12" fill="#161207" stroke="#fbbf24" stroke-width="1.6"/>
  <text x="420" y="224" text-anchor="middle" font-size="17" font-weight="700" fill="#fbbf24">reason — the LLM</text>
  <text x="420" y="245" text-anchor="middle" font-size="12" fill="#e6e9ef">emits tool calls…</text>
  <text x="420" y="263" text-anchor="middle" font-size="11.5" fill="#9aa4b5">…then waits for the answer</text>

  <!-- append/assemble -->
  <rect x="100" y="420" width="220" height="90" rx="12" fill="#11151c" stroke="#e2e8f0" stroke-opacity="0.16"/>
  <text x="210" y="450" text-anchor="middle" font-size="15" font-weight="600" fill="#e6e9ef">append the observations</text>
  <text x="210" y="472" text-anchor="middle" font-size="12" fill="#9aa4b5">assemble the next turn</text>
  <text x="210" y="491" text-anchor="middle" font-size="11" fill="#68738a">m-context compacts</text>

  <!-- the tools, INSIDE the world band -->
  <rect x="360" y="768" width="220" height="74" rx="12" fill="#fbbf24" fill-opacity="0.05" stroke="#fbbf24" stroke-opacity="0.6" stroke-width="1.4"/>
  <text x="470" y="796" text-anchor="middle" font-size="16" font-weight="600" fill="#fbbf24">run the tools</text>
  <text x="470" y="816" text-anchor="middle" font-size="11.5" fill="#9aa4b5">terminal · read_file · edit</text>
  <text x="470" y="833" text-anchor="middle" font-size="10.5" fill="#68738a">inside the world — inside the loop</text>

  <!-- loop arrows -->
  <path d="M 495,274 C 610,360 645,560 600,764" fill="none" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#cArrA)"/>
  <text x="618" y="430" font-size="13" fill="#fbbf24">tool calls ↓</text>
  <text x="606" y="452" font-size="11" fill="#9aa4b5">control descends into the world —</text>
  <text x="606" y="470" font-size="11" fill="#9aa4b5">no next thought until it returns</text>

  <path d="M 360,790 C 250,720 200,600 208,514" fill="none" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#cArrA)"/>
  <text x="190" y="618" text-anchor="end" font-size="13" fill="#fbbf24">the result ↑</text>
  <text x="190" y="638" text-anchor="end" font-size="11.5" fill="#9aa4b5">control returns</text>
  <text x="190" y="656" text-anchor="end" font-size="11.5" fill="#9aa4b5">with the observation</text>

  <path d="M 210,420 C 220,340 265,290 318,252" fill="none" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#cArrA)"/>
  <text x="205" y="330" text-anchor="end" font-size="11.5" fill="#9aa4b5">the next turn</text>

  <!-- loop centre -->
  <text x="405" y="560" text-anchor="middle" font-size="12" fill="#68738a" letter-spacing="2">ONE STEP = ONE LAP</text>
  <text x="405" y="582" text-anchor="middle" font-size="11" fill="#68738a">and the lap passes through the world</text>

  <!-- exit -->
  <path d="M 522,222 C 606,204 662,191 718,178" fill="none" stroke="#6ee7a0" stroke-width="1.7" marker-end="url(#cArrG)"/>
  <text x="622" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#6ee7a0">no tool calls → answered</text>
  <text x="622" y="168" text-anchor="middle" font-size="11" fill="#68738a">the loop halts only by not calling</text>

  <!-- ===================== MIND — the loop closes on itself ===================== -->
  <!-- burst -->
  <rect x="1130" y="180" width="240" height="78" rx="12" fill="#0a1512" stroke="#5eead4" stroke-width="1.6"/>
  <text x="1250" y="208" text-anchor="middle" font-size="17" font-weight="700" fill="#5eead4">burst — the LLM</text>
  <text x="1250" y="229" text-anchor="middle" font-size="12" fill="#e6e9ef">calls nothing, waits for nothing</text>
  <text x="1250" y="247" text-anchor="middle" font-size="11.5" fill="#9aa4b5">a few sentences of thought</text>

  <!-- frame -->
  <rect x="985" y="470" width="245" height="90" rx="12" fill="#11151c" stroke="#e2e8f0" stroke-opacity="0.16"/>
  <text x="1108" y="496" text-anchor="middle" font-size="15.5" font-weight="600" fill="#e6e9ef">the frame</text>
  <text x="1108" y="516" text-anchor="middle" font-size="11.5" fill="#9aa4b5">story · recent</text>
  <text x="1108" y="534" text-anchor="middle" font-size="11.5" fill="#9aa4b5">“this just happened” · the tail</text>
  <text x="1108" y="552" text-anchor="middle" font-size="11" fill="#68738a">rebuilt fresh each burst</text>

  <!-- boundary -->
  <rect x="1330" y="470" width="230" height="76" rx="12" fill="#11151c" stroke="#e2e8f0" stroke-opacity="0.16"/>
  <text x="1445" y="498" text-anchor="middle" font-size="15.5" font-weight="600" fill="#e6e9ef">boundary — the arbiter</text>
  <text x="1445" y="518" text-anchor="middle" font-size="11.5" fill="#9aa4b5">the gate where stimuli queue</text>
  <text x="1445" y="534" text-anchor="middle" font-size="11" fill="#68738a">housekeeping between bursts</text>

  <!-- loop arrows (closed, above the world) -->
  <path d="M 1340,258 C 1425,300 1458,380 1446,466" fill="none" stroke="#5eead4" stroke-width="1.8" marker-end="url(#cArrT)"/>
  <path d="M 1328,524 C 1296,558 1266,558 1236,530" fill="none" stroke="#5eead4" stroke-width="1.8" marker-end="url(#cArrT)"/>
  <path d="M 1010,468 C 985,380 1030,290 1128,234" fill="none" stroke="#5eead4" stroke-width="1.8" marker-end="url(#cArrT)"/>

  <!-- loop centre -->
  <text x="1255" y="408" text-anchor="middle" font-size="44" fill="#68738a">∞</text>
  <text x="1255" y="438" text-anchor="middle" font-size="11" fill="#68738a">never suspended — it turns on its own clock</text>

  <!-- m-act, backstage -->
  <rect x="940" y="618" width="190" height="64" rx="10" fill="#11151c" stroke="#a78bfa" stroke-opacity="0.5"/>
  <text x="1035" y="644" text-anchor="middle" font-size="15" font-weight="600" fill="#e6e9ef">m-act — the realizer</text>
  <text x="1035" y="664" text-anchor="middle" font-size="11.5" fill="#9aa4b5">reads the stream, backstage</text>

  <!-- wondering: burst → m-act -->
  <path d="M 1138,252 C 940,300 900,470 995,612" fill="none" stroke="#5eead4" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#cArrT)"/>
  <text x="930" y="596" text-anchor="end" font-size="12.5" fill="#5eead4">a wondering</text>
  <text x="930" y="614" text-anchor="end" font-size="12.5" fill="#5eead4">drifts out…</text>

  <!-- deed: m-act → world (fire and forget) -->
  <path d="M 1030,682 L 1030,736" fill="none" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#cArrV)"/>
  <text x="1046" y="712" font-size="11.5" fill="#68738a">the deed — nothing waits for it</text>

  <!-- interrupt: world → boundary -->
  <path d="M 1502,736 C 1525,660 1505,595 1455,552" fill="none" stroke="#6ee7a0" stroke-width="1.8" marker-end="url(#cArrG)"/>
  <text x="1255" y="600" font-size="12.5" fill="#6ee7a0">…the answer knocks:</text>
  <text x="1255" y="618" font-size="12.5" fill="#6ee7a0">an interrupt-request,</text>
  <text x="1255" y="636" font-size="12.5" fill="#6ee7a0">queued at the boundary —</text>
  <text x="1255" y="656" font-size="11" fill="#68738a">admitted by salience, or lost</text>

  <!-- ===== captions ===== -->
  <text x="840" y="918" text-anchor="middle" font-size="13.5" fill="#9aa4b5">the same machinery, the control reversed — the agent’s loop passes through the world; the mind’s loop closes on itself.</text>
  <text x="840" y="944" text-anchor="middle" font-size="13.5" fill="#68738a">deeds leave without waiting; answers queue at the boundary, and may never be felt.</text>
  <text x="840" y="972" text-anchor="middle" font-size="12" fill="#68738a" fill-opacity="0.8">corollary: a model that never waits for the world has no use for seeing tools — the line of awareness follows from the direction of control.</text>
</svg>
