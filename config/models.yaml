# Model registry — maps roles and presets to provider + model pairs.
# See doc/configuration.md for usage.

defaultProfile: cloud

providers:
  local:
    baseURL: "${LOCAL_LLM_BASE_URL:http://localhost:1248}"
    apiKey: "${LOCAL_LLM_API_KEY:none}"
    thinking: "${LOCAL_LLM_THINKING:0}"
  openrouter:
    baseURL: "https://openrouter.ai/api/v1"
    apiKey: "${OPENROUTER_API_KEY}"

roles:
  voice:
    provider: openrouter
    model: deepseek/deepseek-v4-flash
  utility:
    provider: openrouter
    model: deepseek/deepseek-v4-flash

presets:
  gpu-local:
    provider: local
    model: ardincoder-1
  gpu-qwen:
    provider: local
    model: qwen3.6-35b-a3b

profiles:
  cloud:
    roles:
      voice: voice
      utility: utility
  local-dev:
    roles:
      voice: gpu-local
      utility: gpu-local
  # Conscious stream on the local model (ardincoder-1), background/utility work
  # (memory distillation, scribe, loop-detector, interrupt scoring) on the cheap
  # cloud model. Tests whether the deepseek drift/identity-collapse seen in the
  # cloud profile (lemma-lab-18) is confined to the utility role when the VOICE
  # is held by the local model.
  local-voice:
    roles:
      voice: gpu-local
      utility: utility
